<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[[brand_name]] - Paiement</title>
</head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f5f5f5;">

<table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 20px;">
<tr><td align="center">

<table width="100%" style="max-width:520px;" cellpadding="0" cellspacing="0">
<tr><td style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08);">

  <div style="height:4px;background:[[primary_color]];"></div>

  <table width="100%" cellpadding="0" cellspacing="0">
  <tr><td style="padding:28px 32px 16px 32px;">
    <span style="font-size:18px;font-weight:700;color:#111111;">[[brand_name]]</span>
  </td></tr>
  </table>

  <table width="100%" cellpadding="0" cellspacing="0">
  <tr><td style="padding:0 32px 0 32px;"><hr style="border:none;border-top:1px solid #f0f0f0;margin:0;"></td></tr>
  </table>

  <table width="100%" cellpadding="0" cellspacing="0">
  <tr><td style="padding:28px 32px;">

    <p style="margin:0 0 6px 0;font-size:16px;color:#333333;">
      Bonjour <strong>[[customer_name]]</strong>,
    </p>

    <p style="margin:0 0 24px 0;font-size:15px;color:#555555;line-height:1.6;">
      [[intro_text]]
    </p>

    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f9f9f9;border-radius:8px;margin-bottom:24px;">
    <tr><td style="padding:20px 24px;">

      <p style="margin:0 0 4px 0;font-size:13px;color:#888888;text-transform:uppercase;letter-spacing:0.5px;">Montant</p>
      <p style="margin:0 0 16px 0;font-size:32px;font-weight:700;color:#111111;">[[amount_formatted]]</p>

      [[installment_block]]

      [[due_date_block]]

      [[description_block]]

    </td></tr>
    </table>

    <table width="100%" cellpadding="0" cellspacing="0">
    <tr><td align="center" style="padding-bottom:16px;">
      <a href="[[payment_url]]"
         style="display:inline-block;background:[[primary_color]];color:#ffffff;text-decoration:none;padding:15px 40px;border-radius:8px;font-size:16px;font-weight:600;">
        Payer maintenant
      </a>
    </td></tr>
    </table>

    <p style="margin:0 0 8px 0;font-size:12px;color:#999999;text-align:center;">
      🔒 Lien sécurisé, valable jusqu'au <strong>[[expires_at]]</strong>
    </p>

    [[support_block]]

  </td></tr>
  </table>

</td></tr>

<tr><td style="padding:16px 0;text-align:center;">
  <p style="margin:0;font-size:11px;color:#bbbbbb;">
    Propulsé par <a href="https://clawshow.ai" style="color:#bbbbbb;text-decoration:none;">ClawShow</a>
  </p>
</td></tr>

</table>

</td></tr>
</table>

</body>
</html>
