<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[[brand_name]] - Paiement reçu</title>
</head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f5f5f5;">

<table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 20px;">
<tr><td align="center">

<table width="100%" style="max-width:520px;" cellpadding="0" cellspacing="0">
<tr><td style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08);">

  <div style="height:4px;background:[[primary_color]];"></div>

  <table width="100%" cellpadding="0" cellspacing="0">
  <tr><td style="padding:28px 32px 16px 32px;">
    <span style="font-size:18px;font-weight:700;color:#111111;">[[brand_name]]</span>
  </td></tr>

  <!-- Success banner -->
  <tr><td style="padding:8px 32px 24px 32px;text-align:center;">
    <div style="display:inline-block;background:#d1fae5;border-radius:50%;width:64px;height:64px;line-height:64px;font-size:32px;text-align:center;">✓</div>
    <h1 style="margin:16px 0 8px 0;color:#065f46;font-size:22px;font-weight:700;">Paiement reçu</h1>
    <p style="margin:0;color:#6b7280;font-size:15px;">Bonjour [[customer_name]], merci pour votre paiement.</p>
  </td></tr>

  <!-- Payment details -->
  <tr><td style="padding:0 32px 24px 32px;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f9fafb;border-radius:8px;padding:20px;">
    <tr><td>

      <p style="margin:0 0 4px 0;font-size:13px;color:#9ca3af;">Montant</p>
      <p style="margin:0 0 16px 0;font-size:28px;font-weight:700;color:#111111;">[[amount_formatted]]</p>

      <p style="margin:0 0 4px 0;font-size:13px;color:#9ca3af;">Échéance</p>
      <p style="margin:0 0 16px 0;font-size:15px;color:#374151;">[[installment_no]] sur [[total_installments]]</p>

      <p style="margin:0 0 4px 0;font-size:13px;color:#9ca3af;">Date de paiement</p>
      <p style="margin:0 0 16px 0;font-size:15px;color:#374151;">[[paid_at]]</p>

      <p style="margin:0 0 4px 0;font-size:13px;color:#9ca3af;">Référence</p>
      <p style="margin:0;font-size:13px;color:#6b7280;font-family:monospace;">[[transaction_ref]]</p>

    </td></tr>
    </table>
  </td></tr>

  <!-- Next step block (completion or next due) -->
  [[next_block]]

  <!-- Support -->
  [[support_block]]

  <!-- Footer -->
  <tr><td style="background:#f9fafb;padding:16px 32px;text-align:center;border-top:1px solid #e5e7eb;">
    <p style="margin:0;font-size:12px;color:#9ca3af;">
      Propulsé par <a href="https://clawshow.ai" style="color:#6b7280;text-decoration:none;">ClawShow</a>
    </p>
  </td></tr>

  </table>
</td></tr>
</table>

</td></tr>
</table>

</body>
</html>
